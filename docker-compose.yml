version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: hostel
      POSTGRES_USER: hosteluser
      POSTGRES_PASSWORD: hostelpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://hosteluser:hostelpass@db:5432/hostel

volumes:
  postgres_data: